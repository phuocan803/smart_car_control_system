<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Web Stream - Smart Car</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #2d3748;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #48bb78;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            min-height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-stream {
            width: 100%;
            height: auto;
            max-height: 600px;
            display: block;
        }

        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #1a202c;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            color: #718096;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .info-value {
            color: #edf2f7;
            font-weight: 600;
        }

        .status {
            grid-column: 1 / -1;
            color: #48bb78;
            font-weight: bold;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Camera Stream Monitor</h1>
        <p class="subtitle">Smart Car Real-Time Monitoring System</p>

        <div class="video-wrapper">
            <img class="video-stream" src="/video_feed" alt="Camera Feed Stream">
        </div>

        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Camera Driver:</span>
                <span class="info-value" id="camera-type">Loading...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Resolution:</span>
                <span class="info-value" id="resolution">Loading...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Frame Rate:</span>
                <span class="info-value" id="fps">Loading...</span>
            </div>
            <div class="info-item">
                <span class="info-label">JPEG Quality:</span>
                <span class="info-value" id="quality">Loading...</span>
            </div>
            <div class="info-item">
                <span class="info-label">LAN Stream URL:</span>
                <span class="info-value" id="url">Loading...</span>
            </div>
            <span class="status">Streaming Live</span>
        </div>
    </div>

    <script>
        fetch('/camera_info')
            .then(response => response.json())
            .then(data => {
                const cameraNames = {
                    'picamera': 'Pi Camera Module',
                    'usb_webcam': 'USB Webcam',
                    'unknown': 'Generic Video Device'
                };
                
                document.getElementById('camera-type').textContent = cameraNames[data.camera_type] || data.camera_type;
                document.getElementById('resolution').textContent = `${data.width}x${data.height}`;
                document.getElementById('fps').textContent = `${data.fps} FPS`;
                document.getElementById('quality').textContent = `${data.quality}%`;
                document.getElementById('url').textContent = `http://${data.ip}:${data.port}`;
            })
            .catch(err => {
                console.error('Failed to load camera metrics:', err);
            });
    </script>
</body>
</html>
